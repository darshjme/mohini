<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    @keyframes glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .dot { animation: pulse 3s ease-in-out infinite; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="840" height="180" fill="url(#bg)" rx="8"/>
  <!-- Neural net dots -->
  <circle cx="80" cy="50" r="2" fill="#58a6ff" class="dot" style="animation-delay:0s"/>
  <circle cx="160" cy="130" r="1.5" fill="#a371f7" class="dot" style="animation-delay:0.5s"/>
  <circle cx="680" cy="40" r="2" fill="#f78166" class="dot" style="animation-delay:1s"/>
  <circle cx="760" cy="120" r="1.5" fill="#3fb950" class="dot" style="animation-delay:1.5s"/>
  <circle cx="400" cy="30" r="1" fill="#58a6ff" class="dot" style="animation-delay:0.3s"/>
  <circle cx="600" cy="150" r="1.5" fill="#a371f7" class="dot" style="animation-delay:0.8s"/>
  <line x1="80" y1="50" x2="160" y2="130" stroke="#30363d" stroke-width="0.5" class="dot"/>
  <line x1="680" y1="40" x2="760" y2="120" stroke="#30363d" stroke-width="0.5" class="dot" style="animation-delay:1s"/>
  <!-- Title -->
  <text x="420" y="75" text-anchor="middle" fill="url(#accent)" class="title" font-size="48" font-weight="700" style="animation: glow 4s ease-in-out infinite">mohini</text>
  <text x="420" y="110" text-anchor="middle" fill="#8b949e" class="title" font-size="16" font-weight="400">the agent operating system</text>
  <text x="420" y="145" text-anchor="middle" fill="#6e7681" class="title" font-size="12">one binary · 104 skills · 40 channels · 188 models · zero downtime</text>
</svg>
