<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 160">
  <defs>
    <linearGradient id="memBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#8b949e"/>
    </marker>
  </defs>
  <style>
    @keyframes flow {
      0% { stroke-dashoffset: 16; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes flowReverse {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 16; }
    }
    .flowR { stroke-dasharray: 4 4; animation: flow 1.5s linear infinite; }
    .flowL { stroke-dasharray: 4 4; animation: flowReverse 1.5s linear infinite; }
    .tier { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="840" height="160" fill="url(#memBg)" rx="8"/>

  <!-- Tier 1: Hot Cache (Redis) -->
  <rect x="40" y="30" width="210" height="100" rx="10" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="145" y="55" text-anchor="middle" class="tier" font-size="15" font-weight="700" fill="#f85149">Hot Cache</text>
  <text x="145" y="74" text-anchor="middle" class="tier" font-size="11" fill="#8b949e">Redis</text>
  <text x="145" y="92" text-anchor="middle" class="tier" font-size="10" fill="#6e7681">L1 Context Window</text>
  <text x="145" y="108" text-anchor="middle" class="tier" font-size="9" fill="#484f58">Active conversation</text>
  <text x="145" y="120" text-anchor="middle" class="tier" font-size="9" fill="#484f58">+ auto-compaction</text>

  <!-- Arrows between tier 1 and 2 -->
  <line x1="250" y1="68" x2="300" y2="68" stroke="#3fb950" stroke-width="1.2" class="flowR" marker-end="url(#arrowR)"/>
  <text x="275" y="62" text-anchor="middle" class="tier" font-size="8" fill="#3fb950">boost</text>
  <line x1="300" y1="90" x2="250" y2="90" stroke="#58a6ff" stroke-width="1.2" class="flowL" marker-end="url(#arrowL)"/>
  <text x="275" y="104" text-anchor="middle" class="tier" font-size="8" fill="#58a6ff">recall</text>

  <!-- Tier 2: Vector Store (Qdrant) -->
  <rect x="310" y="30" width="220" height="100" rx="10" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/>
  <text x="420" y="55" text-anchor="middle" class="tier" font-size="15" font-weight="700" fill="#a371f7">Vector Store</text>
  <text x="420" y="74" text-anchor="middle" class="tier" font-size="11" fill="#8b949e">Qdrant</text>
  <text x="420" y="92" text-anchor="middle" class="tier" font-size="10" fill="#6e7681">L2 Semantic Memory</text>
  <text x="420" y="108" text-anchor="middle" class="tier" font-size="9" fill="#484f58">Embedding vectors</text>
  <text x="420" y="120" text-anchor="middle" class="tier" font-size="9" fill="#484f58">+ cosine similarity</text>

  <!-- Arrows between tier 2 and 3 -->
  <line x1="530" y1="68" x2="580" y2="68" stroke="#f78166" stroke-width="1.2" class="flowR" marker-end="url(#arrowR)"/>
  <text x="555" y="62" text-anchor="middle" class="tier" font-size="8" fill="#f78166">compact</text>
  <line x1="580" y1="90" x2="530" y2="90" stroke="#58a6ff" stroke-width="1.2" class="flowL" marker-end="url(#arrowL)"/>
  <text x="555" y="104" text-anchor="middle" class="tier" font-size="8" fill="#58a6ff">recall</text>

  <!-- Tier 3: Persistent KB (SQLite) -->
  <rect x="590" y="30" width="210" height="100" rx="10" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="695" y="55" text-anchor="middle" class="tier" font-size="15" font-weight="700" fill="#58a6ff">Persistent KB</text>
  <text x="695" y="74" text-anchor="middle" class="tier" font-size="11" fill="#8b949e">SQLite</text>
  <text x="695" y="92" text-anchor="middle" class="tier" font-size="10" fill="#6e7681">L3 Long-Term Memory</text>
  <text x="695" y="108" text-anchor="middle" class="tier" font-size="9" fill="#484f58">JSONL mirroring</text>
  <text x="695" y="120" text-anchor="middle" class="tier" font-size="9" fill="#484f58">+ access boosting</text>
</svg>
